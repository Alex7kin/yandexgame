name = "yandexgame-bot"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Non-secret config. Secrets (BOT_TOKEN, SIGNING_SECRET, WEBHOOK_SECRET) are set
# with `wrangler secret put <NAME>` — never commit them.
[vars]
GAME_SHORT_NAME = "bikecourier"                       # must match the short name set in @BotFather /newgame
CHESS_SHORT_NAME = "chess"                            # a 2nd @BotFather /newgame short name, for /chess challenges
GAME_URL        = "https://alex7kin.github.io/yandexgame/"
ALLOWED_ORIGIN  = "https://alex7kin.github.io"         # the game's origin (for CORS on /score)
BOT_USERNAME    = "yandexGame0_0bot"
OWNER_ID        = "1247580692"                                   # your Telegram user id — only this user may run /reset (DM the bot to learn yours)
RANKED_GAME     = "stack"                                        # must match RANKED_GAME in app.js — only this game updates Telegram's native board

# Central scores live in D1 (SQLite). Create it once, then paste the id below:
#   npx wrangler d1 create gamezone
#   npx wrangler d1 execute gamezone --remote --file=schema.sql
[[d1_databases]]
binding       = "DB"
database_name = "gamezone"
database_id   = "670c2da4-87dd-4418-9c93-e731bca221e7"

# One Durable Object per chess match (authoritative game + WebSockets).
[[durable_objects.bindings]]
name       = "CHESS"
class_name = "ChessMatch"

# SQLite-backed DO so it runs on the Workers free plan.
[[migrations]]
tag                = "v1"
new_sqlite_classes = ["ChessMatch"]
