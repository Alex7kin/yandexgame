<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#14141a" />
  <title>Game Zone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Launcher: pick a game. Shown when no game is mounted. -->
    <div id="menu">
      <h1 class="menu-title">Game&nbsp;Zone</h1>
      <p class="menu-sub">Pick a game</p>
      <div id="gameGrid"><!-- tiles injected by app.js --></div>
    </div>

    <!-- Play area: shared by every game, shown only while one is mounted. -->
    <div id="stage" class="hidden">
      <canvas id="game"></canvas>

      <!-- Heads-up display -->
      <div id="hud">
        <span id="score">0</span>
        <span id="best">BEST 0</span>
      </div>

      <!-- Back to menu / mute toggles -->
      <button id="back" class="btn" aria-label="Back to menu">←</button>
      <button id="mute" class="btn" aria-label="Toggle sound">🔊</button>

      <!-- Start screen (title/lead/hint/sub filled by the host from game metadata) -->
      <div id="startScreen" class="overlay">
        <div class="card">
          <h1 id="startTitle"></h1>
          <p class="lead" id="startLead"></p>
          <p class="hint" id="startHint"></p>
          <p class="sub" id="startSub"></p>
          <p class="cta">Press to start</p>
        </div>
      </div>

      <!-- Game over screen -->
      <div id="gameOver" class="overlay hidden">
        <div class="card">
          <h1 id="overTitle">Game Over</h1>
          <p class="score-line">Score <b id="finalScore">0</b></p>
          <p class="score-line">Best <b id="finalBest">0</b></p>
          <p class="cta"><b>Space</b> / <b>Tap</b> to retry</p>
        </div>
      </div>
    </div><!-- /stage -->

    <!-- Portrait lock — full window; shown only on touch devices held in landscape -->
    <div id="rotate">
      <div class="rotate-phone">📱</div>
      <p>Please rotate your device to <b>portrait</b> to play.</p>
    </div>
  </div>

  <!-- Telegram Gaming Platform proxy (provides TelegramGameProxy; harmless outside Telegram) -->
  <script src="https://telegram.org/js/games.js"></script>
  <!-- Host first (defines GameHost.register), then each game registers itself -->
  <script src="app.js"></script>
  <script src="games/bikecourier.js"></script>
  <script src="games/stack.js"></script>
  <script src="games/2048.js"></script>
</body>
</html>
