<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#aee7ff" />
  <title>Bike Courier</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <!-- Heads-up display -->
    <div id="hud">
      <span id="best">BEST 0</span>
      <span id="score">0</span>
    </div>

    <!-- Mute toggle -->
    <button id="mute" class="btn" aria-label="Toggle sound">🔊</button>

    <!-- Start screen -->
    <div id="startScreen" class="overlay">
      <div class="card">
        <h1>Bike&nbsp;Courier</h1>
        <p class="lead">Ride the road and jump the potholes!</p>
        <p class="hint"><b>Space</b> / <b>Tap</b> to jump</p>
        <p class="sub">Hold longer to jump higher</p>
        <p class="cta">Press to start</p>
      </div>
    </div>

    <!-- Game over screen -->
    <div id="gameOver" class="overlay hidden">
      <div class="card">
        <h1 class="crash">Crash!</h1>
        <p class="score-line">Score <b id="finalScore">0</b></p>
        <p class="score-line">Best <b id="finalBest">0</b></p>
        <p class="cta"><b>Space</b> / <b>Tap</b> to retry</p>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
